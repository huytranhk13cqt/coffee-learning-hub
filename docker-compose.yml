services:
  postgres:
    image: postgres:17
    container_name: relax-postgres
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${DB_NAME:-knowledge_learning}
      POSTGRES_USER: ${DB_USER:-relax_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-relaxpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 01: Schema (all tables, ENUMs, functions, triggers — consolidated through migration 016)
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # 02–10: Original seed data (English grammar, Python, Math, Cyber, Psychology, Design, History, Music, Philosophy)
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./database/seed_python.sql:/docker-entrypoint-initdb.d/03-seed-python.sql:ro
      - ./database/seed_math.sql:/docker-entrypoint-initdb.d/04-seed-math.sql:ro
      - ./database/seed_cybersecurity.sql:/docker-entrypoint-initdb.d/05-seed-cyber.sql:ro
      - ./database/seed_psychology.sql:/docker-entrypoint-initdb.d/06-seed-psych.sql:ro
      - ./database/seed_design.sql:/docker-entrypoint-initdb.d/07-seed-design.sql:ro
      - ./database/seed_history.sql:/docker-entrypoint-initdb.d/08-seed-history.sql:ro
      - ./database/seed_music.sql:/docker-entrypoint-initdb.d/09-seed-music.sql:ro
      - ./database/seed_philosophy.sql:/docker-entrypoint-initdb.d/10-seed-philosophy.sql:ro
      # 11–13: Phase 22 additions (Physics, Economics, Chemistry) — previously missing from docker-compose
      - ./database/seed_physics.sql:/docker-entrypoint-initdb.d/11-seed-physics.sql:ro
      - ./database/seed_economics.sql:/docker-entrypoint-initdb.d/12-seed-economics.sql:ro
      - ./database/seed_chemistry.sql:/docker-entrypoint-initdb.d/13-seed-chemistry.sql:ro
      # 14: Phase 19B — Audio/Video sections added to existing lessons
      - ./database/seed_media_sections.sql:/docker-entrypoint-initdb.d/14-seed-media.sql:ro
      # 15–19: Phase 19C — 5 new topic categories
      - ./database/seed_data_science.sql:/docker-entrypoint-initdb.d/15-seed-data-science.sql:ro
      - ./database/seed_medicine.sql:/docker-entrypoint-initdb.d/16-seed-medicine.sql:ro
      - ./database/seed_personal_finance.sql:/docker-entrypoint-initdb.d/17-seed-personal-finance.sql:ro
      - ./database/seed_management.sql:/docker-entrypoint-initdb.d/18-seed-management.sql:ro
      - ./database/seed_systems_thinking.sql:/docker-entrypoint-initdb.d/19-seed-systems-thinking.sql:ro
      # 20–26: Phase 19D — Extra depth lessons for existing categories
      - ./database/seed_design_extra.sql:/docker-entrypoint-initdb.d/20-seed-design-extra.sql:ro
      - ./database/seed_history_extra.sql:/docker-entrypoint-initdb.d/21-seed-history-extra.sql:ro
      - ./database/seed_music_extra.sql:/docker-entrypoint-initdb.d/22-seed-music-extra.sql:ro
      - ./database/seed_philosophy_extra.sql:/docker-entrypoint-initdb.d/23-seed-philosophy-extra.sql:ro
      - ./database/seed_economics_extra.sql:/docker-entrypoint-initdb.d/24-seed-economics-extra.sql:ro
      - ./database/seed_physics_extra.sql:/docker-entrypoint-initdb.d/25-seed-physics-extra.sql:ro
      - ./database/seed_chemistry_extra.sql:/docker-entrypoint-initdb.d/26-seed-chemistry-extra.sql:ro
      # 27: Phase 20 — Media content showcase (images, video, audio on lessons + exercises)
      - ./database/seed_media_content.sql:/docker-entrypoint-initdb.d/27-seed-media-content.sql:ro
      # 28: Topic grouping — 44 topics + 28 new categories + assignments
      - ./database/seed_topics.sql:/docker-entrypoint-initdb.d/28-seed-topics.sql:ro
      # 29: Interactive charts — explorable explanation sections for Math, Physics, Economics, Data Science
      - ./database/seed_interactive_charts.sql:/docker-entrypoint-initdb.d/29-seed-interactive-charts.sql:ro
      # 30–35: New curriculum content (28 new subjects across 6 batch files)
      - ./database/seed_social_new.sql:/docker-entrypoint-initdb.d/30-seed-social-new.sql:ro
      - ./database/seed_business_new.sql:/docker-entrypoint-initdb.d/31-seed-business-new.sql:ro
      - ./database/seed_arts_humanities_new.sql:/docker-entrypoint-initdb.d/32-seed-arts-humanities-new.sql:ro
      - ./database/seed_science_nature_new.sql:/docker-entrypoint-initdb.d/33-seed-science-nature-new.sql:ro
      - ./database/seed_health_lifestyle_new.sql:/docker-entrypoint-initdb.d/34-seed-health-lifestyle-new.sql:ro
      - ./database/seed_tech_engineering_new.sql:/docker-entrypoint-initdb.d/35-seed-tech-engineering-new.sql:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-relax_user} -d ${DB_NAME:-knowledge_learning}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
